
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Gastador</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#cfefff" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" sizes="48x48" href="icons/icon-48.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root{ --bg:#cfefff; --card:#fff; --line:#b7c4cf; --sum:#fffb8f; --text:#0b0b0b; font-family: 'Google Sans','Product Sans',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; }
    *{box-sizing:border-box}

    html{ font-size:14px; }
    @media (min-width:480px){ html{ font-size:15px; } }
    @media (min-width:900px){ html{ font-size:16px; } }

    body{margin:0;background:var(--bg);color:var(--text);display:grid;place-items:start center;min-height:100dvh;padding:10px;font-family:inherit}
    .app{width:min(100%,900px)}
    header{text-align:center;margin-bottom:8px}
    header .wrap{display:flex;align-items:center;gap:8px;justify-content:center}
    h1{margin:0;font-size:1.05rem}

    .toolbar{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap}
    button{background:#fff;border:1.5px solid #000;border-radius:6px;padding:7px 10px;min-height:34px;min-width:34px;cursor:pointer;font-family:inherit;font-size:0.9rem}

    /* Loaded list name bar */
    .listname-bar{display:flex;align-items:center;gap:8px;margin:6px 0 8px 0}
    .listname-bar label{font-size:0.86rem}
    .namebox{flex:1;min-height:34px;border:1.5px solid #000;border-radius:6px;background:#fff;padding:6px 10px;font-size:0.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    .table-wrap{width:100%;background:var(--card);border:1.5px solid #000;border-radius:6px;overflow:hidden}

    /* Item | Date | Amount | Action */
    .thead,.row{display:grid;grid-template-columns: minmax(0,1fr) 100px 78px 40px;align-items:stretch}

    .thead{position:sticky;top:0;z-index:5;background:#eef6ff;font-weight:700;border-bottom:1.5px solid #000}
    .cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px;display:flex;align-items:center;gap:6px;min-height:36px;position:relative}
    .cell:last-child{border-right:none}

    /* CENTER the last column (header + rows) */
    .thead .cell:last-child, .row .cell:last-child{ justify-content:center; }

    input[type=number], input[type=date]{width:100%;border:none;outline:none;background:transparent;font-size:0.93rem;padding:3px 0;font-family:inherit}
    input[type=number]{text-align:right}

    .item-input{width:100%;border:none;outline:none;background:transparent;font-size:0.93rem;line-height:1.25;resize:none;overflow:hidden;padding:2px 0;min-height:1.8em;max-height:7.5em;word-break:break-word;font-family:inherit}

    .icon-btn{border:1px solid #000;border-radius:6px;background:#fff;padding:6px;min-width:32px;min-height:32px;line-height:1;font-size:0.9rem}
    .icon-btn[disabled]{opacity:.5;cursor:not-allowed}

    /* Single action button (gear) — slightly smaller to avoid hugging the border */
    .gear{font-size:1.05rem; padding:3px 5px; min-width:28px; min-height:28px}

    /* Floating speed menu PORTALED to <body> */
    .portal-menu{position:fixed; top:0; left:0; transform: translate(-9999px,-9999px);
      background:#fff; border:1.5px solid #000; border-radius:10px; box-shadow:0 10px 24px rgba(0,0,0,.22);
      min-width:180px; z-index:10000; display:none; overflow:hidden}
    .portal-menu.show{display:block}
    .portal-menu button{display:flex;align-items:center;gap:8px;width:100%;background:#fff;border:0;border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;font-size:0.94rem}
    .portal-menu button:last-child{border-bottom:0}

    .foot{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:var(--card);padding:8px;border:1.5px solid #000;border-top:none;border-radius:0 0 6px 6px;position:sticky;bottom:0;z-index:4}
    .foot-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .sum{width:130px;border:1.5px solid #000;border-radius:4px;background:#fffb8f;padding:8px 10px;text-align:right;font-weight:700;min-height:36px;display:flex;align-items:center;justify-content:flex-end;font-size:0.96rem}

    .box{width:150px;border:1.5px solid #000;border-radius:4px;background:#fff;padding:6px 8px;display:flex;flex-direction:column;gap:3px}
    .box label{font-size:0.76rem;color:#222}
    .box input{border:none;outline:none;font-size:0.93rem;width:100%;font-family:inherit}
    .box .value{font-weight:700;text-align:right;min-height:22px;font-size:0.93rem}

    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:9999;padding:16px}
    .modal.show{display:flex}
    .dialog{background:#fff;border:1.5px solid #000;border-radius:8px;max-width:92vw;width:460px;padding:14px}
    .dialog h2{margin:0 0 8px;font-size:1rem}
    .dialog p{margin:0 0 12px}
    .dialog .actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
    .list{max-height:50vh;overflow:auto;margin:8px 0;border:1px solid var(--line);border-radius:6px;background:#fafafa}
    .list-row{display:flex;align-items:center;gap:8px}
    .list-row button.name{flex:1;text-align:left;border:0;border-bottom:1px solid var(--line);border-radius:0;background:#fff;padding:12px 14px}
    .list-row button.trash{border:0;border-left:1px solid var(--line);border-bottom:1px solid var(--line);border-radius:0;background:#fff;padding:12px 14px}
    .list-row:last-child button.name,.list-row:last-child button.trash{border-bottom:0}
    .img-view{max-width:100%;height:auto;border:1px solid #000;border-radius:6px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="wrap">
        <img src="icons/icon-48.png" alt="Gastador" width="26" height="26" style="border-radius:8px;border:1px solid #000;background:#fff"/>
        <h1>Gastador</h1>
      </div>
    </header>

    <div class="toolbar">
      <button id="newBtn">New list</button>
      <button id="saveBtn">Save list</button>
      <button id="loadBtn">Load list</button>
    </div>

    <!-- Loaded list name bar -->
    <div class="listname-bar" role="status" aria-live="polite">
      <label for="listNameView">Loaded list:</label>
      <div id="listNameView" class="namebox" title=""></div>
    </div>

    <div class="table-wrap">
      <div class="table" role="table" aria-label="Financial records">
        <div class="thead" role="row">
          <div class="cell" role="columnheader">Item/s</div>
          <div class="cell" role="columnheader">Date</div>
          <div class="cell" role="columnheader">Amount</div>
          <div class="cell" role="columnheader" title="Actions" aria-label="Actions">&#9881;</div>
        </div>
        <div id="tbody" role="rowgroup"></div>
      </div>
    </div>

    <div class="foot">
      <button id="addRow" aria-label="Add a row">+</button>
      <div class="foot-right">
        <div class="box">
          <label for="cashInput">Cash on hand</label>
          <input id="cashInput" type="number" inputmode="decimal" step="0.01" placeholder="0.00" aria-label="Cash on hand" />
        </div>
        <div class="box">
          <label>Change</label>
          <div class="value" id="changeBox">0.00</div>
        </div>
        <div class="sum" id="sumBox" aria-live="polite">0.00</div>
      </div>
    </div>
  </div>

  <!-- Global portal menu appended to body (one instance reused) -->
  <div id="portalMenu" class="portal-menu" role="menu" aria-hidden="true"></div>

  <!-- Confirm New modal -->
  <div id="confirmNew" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmNewTitle" style="display:none">
    <div class="dialog">
      <h2 id="confirmNewTitle">Start a new list?</h2>
      <p>This will clear all the data in the current displayed list. Do you want to proceed?</p>
      <div class="actions">
        <button id="cancelNew">Cancel</button>
        <button id="proceedNew">Proceed</button>
      </div>
    </div>
  </div>

  <!-- Load list chooser modal -->
  <div id="loadChooser" class="modal" role="dialog" aria-modal="true" aria-labelledby="loadChooserTitle" style="display:none">
    <div class="dialog">
      <h2 id="loadChooserTitle">Load a list</h2>
      <div id="listsContainer" class="list" aria-label="Saved lists"></div>
      <div class="actions">
        <button id="closeLoad">Close</button>
      </div>
    </div>
  </div>

  <!-- Image viewer modal -->
  <div id="imageViewer" class="modal" role="dialog" aria-modal="true" aria-labelledby="imageViewerTitle" style="display:none">
    <div class="dialog">
      <h2 id="imageViewerTitle">Item photo</h2>
      <div id="imageSlot"></div>
      <div class="actions">
        <button id="closeImage">Close</button>
      </div>
    </div>
  </div>

  <script>
    // ==== Utils ====
    const fmtDate = (d = new Date()) => {
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${d.getFullYear()}-${m}-${day}`;
    };
    const tbody = document.getElementById('tbody');
    const sumBox = document.getElementById('sumBox');
    const cashInput = document.getElementById('cashInput');
    const changeBox = document.getElementById('changeBox');
    const listNameView = document.getElementById('listNameView');

    const P='finrec:list:'; const S='finrec:scratch';
    let currentListName = null;

    function autosize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight, parseInt(getComputedStyle(el).maxHeight||'500'))+'px'; }

    async function fileToDataUrlCompressed(file, maxDim = 1280, quality = 0.85){
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > height) { if (width > maxDim) { height = Math.round(height * (maxDim / width)); width = maxDim; } }
          else { if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; } }
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          URL.revokeObjectURL(url);
          resolve(dataUrl);
        };
        img.onerror = reject; img.src = url;
      });
    }

    // GLOBAL portal menu (one instance)
    const portal = document.getElementById('portalMenu');
    function hidePortal(){ portal.classList.remove('show'); portal.setAttribute('aria-hidden','true'); portal.style.transform='translate(-9999px,-9999px)'; }
    function openPortalFor(anchorBtn, row, fileInput){
      // Build menu content each time to bind to this row
      portal.innerHTML = '';
      const mk = (html, handler) => { const b=document.createElement('button'); b.innerHTML=html; b.addEventListener('click',(ev)=>{ ev.stopPropagation(); hidePortal(); handler(); }); return b; };
      const btnCam = mk('&#128247; Take photo', ()=> fileInput.click());
      const btnView = mk('&#128065; View photo', ()=>{ if(!(row.dataset.photo && row.dataset.photo.length)) return alert('No photo yet.'); showImage(row.dataset.photo); });
      const btnDel = mk('&#128465; Delete row', ()=>{ if(confirm('Delete this row?')){ row.remove(); updateSum(); autosave(); } });
      portal.append(btnCam, btnView, btnDel);

      portal.style.display = 'block';
      portal.classList.add('show');
      portal.setAttribute('aria-hidden','false');

      // Position near the anchor button (fixed viewport coords)
      const r = anchorBtn.getBoundingClientRect();
      let top = r.bottom + 8;
      let left = r.right - 180; // assume menu width ~180
      const vw = window.innerWidth, vh = window.innerHeight;
      if (left < 8) left = 8;
      requestAnimationFrame(()=>{
        const mh = portal.offsetHeight || 140;
        const mw = portal.offsetWidth || 180;
        if (top + mh > vh - 8) top = r.top - 8 - mh; // flip above
        if (left + mw > vw - 8) left = vw - 8 - mw;
        portal.style.transform = `translate(${Math.round(left)}px, ${Math.round(top)}px)`;
      });
    }

    // Close on outside click / scroll / resize
    document.addEventListener('click', (e)=>{ if (!portal.contains(e.target)) hidePortal(); });
    window.addEventListener('scroll', hidePortal, {passive:true});
    window.addEventListener('resize', hidePortal);

    function syncListName(){
      const name = currentListName ? currentListName : 'Scratch (unsaved)';
      listNameView.textContent = name;
      listNameView.title = name;
    }

    function makeRow(rec = { id:'', item:'', date:'', amount:'', photo:'' }){
      const row=document.createElement('div'); row.className='row';
      const rid = rec.id || ('r_'+Math.random().toString(36).slice(2)); row.dataset.id = rid;

      // Item (textarea auto-grow)
      const cItem=document.createElement('div'); cItem.className='cell';
      const iItem=document.createElement('textarea'); iItem.className='item-input'; iItem.placeholder='Item name'; iItem.value=rec.item||''; iItem.setAttribute('aria-label','Item name');
      iItem.addEventListener('input', ()=>{ autosize(iItem); autosave(); }); setTimeout(()=>autosize(iItem)); cItem.appendChild(iItem);

      // Date
      const cDate=document.createElement('div'); cDate.className='cell';
      const iDate=document.createElement('input'); iDate.type='date'; iDate.value=rec.date||''; iDate.addEventListener('input', autosave); cDate.appendChild(iDate);

      // Amount (narrower)
      const cAmt=document.createElement('div'); cAmt.className='cell';
      const iAmt=document.createElement('input'); iAmt.type='number'; iAmt.inputMode='decimal'; iAmt.placeholder='0.00'; iAmt.step='0.01'; iAmt.value=rec.amount||''; iAmt.setAttribute('aria-label','Amount');
      iAmt.addEventListener('input', ()=>{ if(!iDate.value && iAmt.value.trim()!==''){ iDate.value=fmtDate(); } updateSum(); autosave(); });
      cAmt.appendChild(iAmt);

      // Action (single gear button opens portal menu)
      const cAct=document.createElement('div'); cAct.className='cell';
      const gear=document.createElement('button'); gear.className='icon-btn gear'; gear.setAttribute('aria-label','More actions'); gear.title='Actions'; gear.textContent='⚙';

      // Hidden file input (row scoped)
      const fileInput=document.createElement('input'); fileInput.type='file'; fileInput.accept='image/*'; fileInput.capture='environment'; fileInput.style.display='none';
      fileInput.addEventListener('change', async()=>{ const f=fileInput.files&&fileInput.files[0]; if(!f) return; try{ const dataUrl=await fileToDataUrlCompressed(f); row.dataset.photo=dataUrl; autosave(); }catch(e){ alert('Could not load photo'); } finally{ fileInput.value=''; } });

      gear.addEventListener('click', (ev)=>{ ev.stopPropagation(); openPortalFor(gear, row, fileInput); });

      cAct.append(gear, fileInput);
      row.append(cItem,cDate,cAmt,cAct);
      if(rec.photo){ row.dataset.photo = rec.photo; }
      return row;
    }

    function addRows(n=1){ for(let i=0;i<n;i++){ tbody.appendChild(makeRow()); } updateSum(); }

    function getData(){
      return Array.from(tbody.querySelectorAll('.row')).map(r=>{
        const item=r.querySelector('.item-input').value.trim();
        const date=r.querySelector('input[type=date]').value.trim();
        const amountRaw=r.querySelector('input[type=number]').value.trim();
        const amount=amountRaw?Number(parseFloat(amountRaw).toFixed(2)).toFixed(2):'';
        const id=r.dataset.id; const photo=r.dataset.photo||'';
        return {id,item,date,amount,photo};
      }).filter(x=>x.item||x.amount||x.date||x.photo);
    }

    function parseNum(v){ const n=parseFloat(v); return isNaN(n)?0:n; }

    function updateSum(){
      let total=0; tbody.querySelectorAll('input[type=number]').forEach(n=>{ const v=parseFloat(n.value); if(!isNaN(v)) total+=v; });
      sumBox.textContent = total.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
      const cash=parseNum(cashInput.value); const change=cash - total; // Cash - Total
      changeBox.textContent = change.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
    }

    function autosave(){
      const payload={ items:getData(), total:parseFloat(sumBox.textContent.replace(/,/g,''))||0, cash:parseNum(cashInput.value) };
      localStorage.setItem(S, JSON.stringify(payload));
      if(currentListName){ const named={ name:currentListName, savedAt:new Date().toISOString(), ...payload }; localStorage.setItem(P+currentListName, JSON.stringify(named)); }
    }

    function restore(){
      const raw=localStorage.getItem(S);
      if(raw){ try{ const s=JSON.parse(raw); (s.items||[]).forEach(rec=>tbody.appendChild(makeRow(rec)));
        if(typeof s.cash==='number' || (typeof s.cash==='string' && s.cash.trim()!=='') ){ cashInput.value=s.cash; }
      }catch(e){}
      }
      ensureFive(); updateSum(); syncListName();
    }

    function ensureFive(){ const c=tbody.querySelectorAll('.row').length; if(c<5) addRows(5-c); }

    function showModal(el){ el.classList.add('show'); el.style.display='flex'; }
    function hideModal(el){ el.classList.remove('show'); el.style.display='none'; }

    function confirmNewList(){ showModal(document.getElementById('confirmNew')); }
    function proceedNewList(){ hideModal(document.getElementById('confirmNew')); tbody.innerHTML=''; ensureFive(); updateSum(); localStorage.removeItem(S); currentListName=null; syncListName(); }

    function saveList(){ const name=prompt('Save list as (name):'); if(!name) return; if(localStorage.getItem(P+name)){ if(!confirm(`"${name}" already exists. Overwrite?`)) return; } const data={ name, savedAt:new Date().toISOString(), items:getData(), total:parseFloat(sumBox.textContent.replace(/,/g,''))||0, cash:parseNum(cashInput.value) }; try{ localStorage.setItem(P+name, JSON.stringify(data)); currentListName=name; syncListName(); alert('Saved: ' + name); }catch(e){ alert('Save failed: ' + e); } }

    function showLoadChooser(){ const box=document.getElementById('loadChooser'); const container=document.getElementById('listsContainer'); container.innerHTML=''; const keys=Object.keys(localStorage).filter(k=>k.startsWith(P)); if(!keys.length){ const empty=document.createElement('div'); empty.style.padding='12px'; empty.textContent='No saved lists yet.'; container.appendChild(empty); } else { keys.map(k=>k.slice(P.length)).sort((a,b)=>a.localeCompare(b)).forEach(name=>{ const row=document.createElement('div'); row.className='list-row'; const btn=document.createElement('button'); btn.className='name'; btn.textContent = name; btn.addEventListener('click', () => { loadListByName(name); hideModal(box); }); const del=document.createElement('button'); del.className='trash'; del.title='Delete list'; del.setAttribute('aria-label', `Delete list ${name}`); del.innerHTML='&#128465;'; del.addEventListener('click', (ev) => { ev.stopPropagation(); if(confirm(`Delete saved list "${name}"? This cannot be undone.`)){ localStorage.removeItem(P + name); showLoadChooser(); } }); row.append(btn, del); container.appendChild(row); }); } showModal(box); }

    function loadListByName(name){ const raw=localStorage.getItem(P+name); if(!raw){ alert('List not found.'); return; } try{ const d=JSON.parse(raw); tbody.innerHTML=''; (d.items||[]).forEach(rec=>tbody.appendChild(makeRow(rec))); cashInput.value=(typeof d.cash!=='undefined')?d.cash:''; currentListName=name; ensureFive(); updateSum(); autosave(); syncListName(); }catch(e){ alert('Could not load that list.'); } }

    function showImage(dataUrl){ const viewer=document.getElementById('imageViewer'); const slot=document.getElementById('imageSlot'); slot.innerHTML=''; const img=document.createElement('img'); img.className='img-view'; img.src = dataUrl; slot.appendChild(img); showModal(viewer); }

    document.getElementById('addRow').addEventListener('click',()=>{ tbody.appendChild(makeRow()); updateSum(); autosave(); });
    document.getElementById('saveBtn').addEventListener('click',saveList);
    document.getElementById('loadBtn').addEventListener('click',showLoadChooser);
    document.getElementById('newBtn').addEventListener('click',confirmNewList);

    document.getElementById('cancelNew').addEventListener('click',()=>hideModal(document.getElementById('confirmNew')));
    document.getElementById('proceedNew').addEventListener('click',proceedNewList);
    document.getElementById('closeLoad').addEventListener('click',()=>hideModal(document.getElementById('loadChooser')));
    document.getElementById('closeImage').addEventListener('click',()=>hideModal(document.getElementById('imageViewer')));

    if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }

    cashInput.addEventListener('input',()=>{ updateSum(); autosave(); });

    // Init
    restore();
  </script>
</body>
</html>
